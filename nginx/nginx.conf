events { worker_connections 512; }

http {
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;
    gzip on;
    # Suppression de text/html ici car il est inclus par défaut
    gzip_types text/plain application/json text/css application/javascript;

    # Flask upstream
    upstream flask_app { server app:5000; }

    server {
        listen 80;
        server_name _;

        # DNS interne de Docker pour la résolution dynamique des noms
        resolver 127.0.0.11 valid=30s;

        add_header X-Content-Type-Options nosniff;

        # ── Application Flask (racine) ─────────────────────────────────────────
        location / {
            proxy_pass         http://flask_app;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # ── Grafana ───────────────────────────────────────────────────────────
        location /grafana/ {
            proxy_pass         http://grafana:3000;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }

        # ── Prometheus ────────────────────────────────────────────────────────
        location /prometheus/ {
            proxy_pass         http://prometheus:9090/prometheus/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
        }

        # ── Jenkins ───────────────────────────────────────────────────────────
        location /jenkins/ {
            proxy_pass         http://jenkins:8080/jenkins/;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 90s;
            proxy_redirect     http://jenkins:8080/jenkins/ /jenkins/;
        }

        # ── cAdvisor ──────────────────────────────────────────────────────────
        location /cadvisor/ {
            proxy_pass         http://cadvisor:8080/;
            proxy_set_header   Host $host;
        }

        # ── Alertmanager ──────────────────────────────────────────────────────
        location /alertmanager/ {
            # Utilisation d'une variable pour éviter le plantage si le service est absent
            set $upstream_alertmanager alertmanager;
            proxy_pass         http://$upstream_alertmanager:9093/alertmanager/;
            proxy_set_header   Host $host;
        }
    }
}
