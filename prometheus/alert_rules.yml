groups:
  - name: service_alerts
    rules:
      - alert: AppDown
        expr: up{job="flask-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Application Flask indisponible"
          description: "L'application est DOWN depuis plus d'1 minute."

      - alert: PrometheusDown
        expr: up{job="prometheus"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "🔴 Prometheus indisponible"
          description: "Prometheus est DOWN depuis 2 minutes."

      - alert: HighErrorRate
        expr: |
          rate(http_requests_total{status=~"5.."}[5m])
          / rate(http_requests_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Taux d'erreurs HTTP élevé (>10%)"
          description: "Plus de 10% des requêtes retournent une erreur 5xx."

      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            rate(http_request_duration_seconds_bucket[5m])
          ) > 0.5
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Latence p95 élevée (>500ms)"
          description: "Le p95 de latence dépasse 500ms depuis 2 minutes."

  - name: student_alerts
    rules:
      - alert: NoStudents
        expr: students_total == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Aucun étudiant en base"
          description: "La base de données étudiants est vide."

      - alert: LowAverageGrade
        expr: students_average_grade < 10
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ Moyenne générale inférieure à 10"
          description: "La moyenne des étudiants est de {{ $value }}/20, en dessous du seuil."

  - name: system_alerts
    rules:
      - alert: HighMemoryUsage
        expr: |
          (1 - node_memory_MemAvailable_bytes/node_memory_MemTotal_bytes) * 100 > 85
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ RAM utilisée à plus de 85%"
          description: "La mémoire système est à {{ $value | printf \"%.1f\" }}%."

      - alert: HighCPU
        expr: |
          100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "⚠️ CPU > 80%"
          description: "Utilisation CPU à {{ $value | printf \"%.1f\" }}%."
